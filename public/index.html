<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Only Tap</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
      <div class="header-container">
          <div class="top-nav-btn" id="shop-btn">SHOP</div>
          <h1>Only Tap</h1>
          <div class="top-nav-btn" id="achievements-btn">Achievement</div>
      </div>
      <div class="meter-container">
        <div class="counter-display">
          <span id="counter">0</span><span class="goal-text"> / <span id="goal">1K</span></span>
          <div id="hover-exact" class="hover-exact">0</div>
        </div>
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" id="progress-fill"></div>
        </div>
      </div>
      <button id="tap-btn" class="tap-button">TAP</button>
      <div class="power-display" id="power-display">+1 click</div>
    </div>

    <!-- Socket.io -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="main.js"></script>
</body>
</html>
